<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroShrink</title>
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0c0c0e;--surface:#141416;--surface2:#1c1c20;--border:#252528;--accent:#a78bfa;--accent-dim:#3b2f6e;--text:#e8e8ec;--text-dim:#5a5a6a;--success:#4ade80;--error:#f87171;--warn:#fbbf24;--mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace}html{line-height:1.15;-webkit-text-size-adjust:100%}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 5rem;margin:0}</style>
  <link rel="stylesheet" href="assets/css/main.css" />
  <script src="assets/js/platforms.js" defer></script>
  <script src="assets/js/platform-slider.js" defer></script>
  <script src="assets/js/platform-selector.js" defer></script>
</head>
<body>

  <header>
    <div class="logo">
      <h1><span class="logo-retro">Retro</span>Shrink</h1>
    </div>
    <p>Converta suas ROMs de
      <span id="platform-name">Playstation 1</span>
      para CHD direto no seu navegador.
    </p>
    <div class="badges">
      <span class="badge green">● 100% Local</span>
      <span class="badge green">● ZERO Upload</span>
    </div>
  </header>

  <select id="platform"></select>

  <!-- Converter card -->
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".iso,.bin,.cue,.img,.raw,.gdi" multiple />
      <span class="drop-icon">💿</span>
      <p class="drop-label">Arraste sua ROM aqui ou clique para selecionar</p>
      <p class="drop-hint" id="dropHint">.iso .bin .cue .gdi .img .raw</p>
    </div>

    <div class="file-info" id="fileInfo">
      <span class="file-icon">📁</span>
      <div class="file-details">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <button class="btn-clear" id="btnClear" title="Remover">✕</button>
    </div>

    <div class="options">
      <div class="option-group">
        <label>Tipo de mídia</label>
        <select id="mediaType">
          <option value="cd">CD-ROM (createcd)</option>
          <option value="dvd" selected>DVD / UMD (createdvd)</option>
          <option value="gdi">GDI — Dreamcast (createcd)</option>
          <option value="hd">HD / Raw (createhd)</option>
        </select>
      </div>
      <div class="option-group">
        <label>Compressão</label>
        <select id="compression">
          <option value="cdlz">cdlz — padrão CD</option>
          <option value="zstd">zstd — máxima</option>
          <option value="zlib">zlib — compatível (PS2)</option>
          <option value="cdzl">cdzl</option>
          <option value="cdfl">cdfl — FLAC</option>
          <option value="none">nenhuma</option>
        </select>
      </div>
    </div>

    <button class="btn-convert" id="btnConvert" disabled>Converter para CHD</button>
  </div>

  <!-- Progress -->
  <div class="card progress-card" id="progressCard">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Iniciando...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- Result -->
  <div class="card result-card" id="resultCard">
    <div class="result-inner">
      <span class="result-icon">✅</span>
      <div class="result-details">
        <div class="result-name" id="resultName"></div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <button class="btn-download" id="btnDownload">⬇ Baixar CHD</button>
    </div>
  </div>

  <footer>
    RetroShrink · <a href="https://github.com/Kelvao/RetroShrink">GitHub</a> · <a href="https://github.com/Kelvao/RetroShrink/issues">Issues</a> · <a href="https://github.com/Kelvao/RetroShrink/discussions">Feedback</a> · <a href="https://github.com/Kelvao/RetroShrink/blob/main/LICENSE">License</a><br>
    <br>
    Created with ❤️ in 🇧🇷
  </footer>

  <script src="main.js" type="module" defer></script>
</body>
</html>
