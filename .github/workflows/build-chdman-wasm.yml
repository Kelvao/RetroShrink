name: Build chdman.wasm

on:
  workflow_dispatch:
    inputs:
      emsdk_version:
        description: 'emsdk version (e.g. 6.0.2, latest)'
        required: true
        default: '6.0.2'
        type: string
      mame_ref:
        description: 'MAME branch/tag/commit (e.g. mame0288, master)'
        required: true
        default: 'mame0288'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
    env:
      EMSDK_VERSION: ${{ github.event.inputs.emsdk_version || '6.0.2' }}
      MAME_REF: ${{ github.event.inputs.mame_ref || 'mame0288' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache emsdk toolchain
        id: cache-emsdk
        uses: actions/cache@v5
        with:
          path: emsdk
          key: emsdk-${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Fetch sources and system dependencies in parallel
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential python3 libsdl2-dev libsdl2-ttf-dev libfontconfig1-dev &
          APT_PID=$!

          (
            if git clone --depth 1 --branch "$MAME_REF" https://github.com/mamedev/mame.git mame-src 2>/dev/null; then
              echo "shallow clone ok"
            else
              git clone https://github.com/mamedev/mame.git mame-src
              cd mame-src
              git checkout "$MAME_REF"
            fi
          ) &
          MAME_PID=$!

          if [ "${{ steps.cache-emsdk.outputs.cache-hit }}" != "true" ]; then
            git clone https://github.com/emscripten-core/emsdk.git emsdk &
            EMSDK_PID=$!
          fi

          wait "$APT_PID"
          wait "$MAME_PID"
          if [ -n "${EMSDK_PID:-}" ]; then wait "$EMSDK_PID"; fi

          echo "MAME_SHA=$(git -C mame-src rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Patch sdlprefix.h (struct _IO_FILE)
        run: |
          # Emscripten's libc already defines struct _IO_FILE (the internal glibc FILE
          # layout). MAME's SDL OSD layer redeclares the same struct with a full body,
          # which collides with Emscripten's own definition and fails to compile.
          # This strips the body down to a forward declaration so both coexist.
          FILE="mame-src/src/osd/sdl/sdlprefix.h"
          if [ -f "$FILE" ]; then
            perl -0777 -pe 'if (/struct\s+_IO_FILE\s*\{/) { s/struct\s+_IO_FILE\s*\{.*?\}\s*;[ \t]*(?:\/\/[^\n]*)?/struct _IO_FILE;/s }' "$FILE" > "$FILE.tmp"
            mv "$FILE.tmp" "$FILE"
          fi

      - name: Install and activate emsdk
        run: |
          cd emsdk
          ./emsdk install "$EMSDK_VERSION"
          ./emsdk activate "$EMSDK_VERSION"
          echo "EMSDK_RESOLVED_VERSION=$(./emsdk list 2>/dev/null | grep INSTALLED | head -n1 | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Generate MAME makefiles (GENie)
        run: |
          source emsdk/emsdk_env.sh
          export EMSCRIPTEN="$(pwd)/emsdk/upstream/emscripten"
          cd mame-src
          emmake make WEBASSEMBLY=1 TOOLS=1 EMULATOR=0 NOWERROR=1 generate
          emmake make WEBASSEMBLY=1 TOOLS=1 EMULATOR=0 NOWERROR=1 REGENIE=1 \
            build/projects/sdl/mame/gmake-asmjs/Makefile

      - name: Patch chdman.make symbol flags
        run: |
          # chdman only needs a small slice of MAME's codebase, but GENie generates
          # link flags as if the full emulator were being linked. That leaves symbols
          # referenced by unused code paths undefined, and Emscripten's linker treats
          # undefined symbols and warnings as hard errors (-Werror,
          # ERROR_ON_UNDEFINED_SYMBOLS=1) by default. These sed edits relax those
          # linker settings so the chdman-only link succeeds; GENie has no flag to
          # generate the makefile this way directly, so it's patched after the fact.
          MAKEFILE_PATH="mame-src/build/projects/sdl/mame/gmake-asmjs/chdman.make"
          if [ -f "$MAKEFILE_PATH" ]; then
            sed -i 's/-Werror//g' "$MAKEFILE_PATH"
            sed -i 's/ERROR_ON_UNDEFINED_SYMBOLS=1/ERROR_ON_UNDEFINED_SYMBOLS=0/g' "$MAKEFILE_PATH"
            sed -i 's/ERROR_ON_UNDEFINED_SYMBOLS=true/ERROR_ON_UNDEFINED_SYMBOLS=false/g' "$MAKEFILE_PATH"
            sed -i '/EXPORTED_FUNCTIONS/d' "$MAKEFILE_PATH"
            sed -i '/DEFAULT_LIBRARY_FUNCS_TO_INCLUDE/d' "$MAKEFILE_PATH"
          else
            echo "Error: chdman.make was not generated by GENie." >&2
            exit 1
          fi

      - name: Build chdman with emmake
        env:
          EMCC_CFLAGS: "-sERROR_ON_UNDEFINED_SYMBOLS=0 -sWARN_ON_UNDEFINED_SYMBOLS=0 -Wno-error=undefined -sEXPORTED_RUNTIME_METHODS='[\"FS\",\"callMain\"]' -sINVOKE_RUN=0"
        run: |
          source emsdk/emsdk_env.sh
          cd mame-src/build/projects/sdl/mame/gmake-asmjs
          emmake make -R config=release precompile
          emmake make -R config=release chdman -j"$(nproc)"

      - name: Collect build artifacts
        run: |
          mkdir -p public
          if [ ! -f mame-src/chdman ] || [ ! -f mame-src/chdman.wasm ]; then
            echo "Error: mame-src/chdman and/or mame-src/chdman.wasm were not produced." >&2
            exit 1
          fi
          cp mame-src/chdman public/chdman.js
          cp mame-src/chdman.wasm public/chdman.wasm

      - name: Generate version JSON for badges and update README links
        run: |
          cat <<EOF > .retroshrink-badge.json
          {
            "mame": "${{ env.MAME_REF }}",
            "emsdk": "${{ env.EMSDK_RESOLVED_VERSION }}"
          }
          EOF
          sed -i -E "s|https://github.com/mamedev/mame/releases/tag/[^)]+|https://github.com/mamedev/mame/releases/tag/${{ env.MAME_REF }}|g" README.md
          sed -i -E "s|https://github.com/emscripten-core/emsdk/releases/tag/[^)]+|https://github.com/emscripten-core/emsdk/releases/tag/${{ env.EMSDK_RESOLVED_VERSION }}|g" README.md
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chdman-wasm
          path: |
            public/chdman.js
            public/chdman.wasm
          retention-days: 14
      
      - name: Open pull request with build output
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "build: update chdman.wasm (mame ${{ env.MAME_SHA }}, emsdk ${{ env.EMSDK_RESOLVED_VERSION }})"
          title: "Update chdman WebAssembly build"
          body: |
            Automated update of the `chdman` binary compiled to WebAssembly, produced by the `build-chdman-wasm` workflow.

            **Build details**
            - MAME ref: `${{ env.MAME_REF }}` (commit `${{ env.MAME_SHA }}`)
            - emsdk version: `${{ env.EMSDK_RESOLVED_VERSION }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Files**
            - `public/chdman.js` — Emscripten glue code
            - `public/chdman.wasm` — WebAssembly binary
            - `README.md` — Updated links to MAME and emsdk releases
            - `.retroshrink-badge.json` - Versioning data for badges
            
            Please review the diff before merging; the binary is built from the MAME source at the ref/commit listed above.
          base: ${{ github.ref_name }}
          branch: "ci/chdman-wasm-${{ github.run_id }}"
          delete-branch: true
          add-paths: |
            public/*
            README.md
            .retroshrink-badge.json
