name: Build and PR CHDMAN WASM

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-pr:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Repository
      uses: actions/checkout@v4

    - name: Clone MAME Source
      run: git clone --depth 1 https://github.com/mamedev/mame.git mame-src

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v15
      with:
        version: 'latest'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3 libsdl2-dev libsdl2-ttf-dev libfontconfig1-dev

    - name: Patch sdlprefix.h
      run: |
        FILE="mame-src/src/osd/sdl/sdlprefix.h"
        if [ -f "$FILE" ]; then
          perl -0777 -pe 'if (/struct\s+_IO_FILE\s*\{/) { s/struct\s+_IO_FILE\s*\{.*?\}\s*;[ \t]*(?:\/\/[^\n]*)?/struct _IO_FILE;/s }' "$FILE" > "$FILE.tmp" && mv "$FILE.tmp" "$FILE"
        fi

    - name: Compile MAME Tools
      run: |
        cd mame-src
        emmake make WEBASSEMBLY=1 TOOLS=1 NOWERROR=1 genie

        MAKEFILE_PATH="build/projects/sdl/mame/gmake-asmjs/chdman.make"
        if [ -f "$MAKEFILE_PATH" ]; then
          sed -i 's/-Werror//g' "$MAKEFILE_PATH"
          sed -i 's/ERROR_ON_UNDEFINED_SYMBOLS=1/ERROR_ON_UNDEFINED_SYMBOLS=0/g' "$MAKEFILE_PATH"
          sed -i 's/ERROR_ON_UNDEFINED_SYMBOLS=true/ERROR_ON_UNDEFINED_SYMBOLS=false/g' "$MAKEFILE_PATH"
          sed -i '/EXPORTED_FUNCTIONS/d' "$MAKEFILE_PATH"
          sed -i '/DEFAULT_LIBRARY_FUNCS_TO_INCLUDE/d' "$MAKEFILE_PATH"
          sed -i 's|ALL_LDFLAGS += |ALL_LDFLAGS += -sERROR_ON_UNDEFINED_SYMBOLS=0 -sWARN_ON_UNDEFINED_SYMBOLS=0 -Wno-error=undefined |g' "$MAKEFILE_PATH"
        else
          exit 1
        fi

        emmake make -R -C build/projects/sdl/mame/gmake-asmjs -f chdman.make config=release -j$(nproc)

    - name: Move Artifacts to Public Folder
      run: |
        mkdir -p public
        find mame-src/ -name "chdman.js" -exec cp {} public/ \;
        find mame-src/ -name "chdman.wasm" -exec cp {} public/ \;
        rm -rf mame-src

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "feat: update chdman wasm binaries in public/"
        branch: update-chdman-wasm
        title: "Feat: Update CHDMAN WASM Binaries"
        body: "Automated PR generated by GitHub Actions to update chdman.js and chdman.wasm in the public directory."
        base: main
