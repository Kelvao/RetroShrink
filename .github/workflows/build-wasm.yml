name: chdman WASM Build

on:
  workflow_dispatch:
    inputs:
      mame_ref:
        description: 'MAME branch, tag ou SHA (ex: mame0288)'
        required: true
        type: string
        default: 'mame0288'
      emsdk_version:
        description: 'Emscripten SDK version'
        required: true
        type: string
        default: '3.1.74'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-wasm:
    name: build chdman.wasm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MAME
        uses: actions/checkout@v7
        with:
          repository: mamedev/mame
          ref: ${{ inputs.mame_ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential python3 git \
            libsdl2-dev libsdl2-ttf-dev \
            libfontconfig-dev \
            libasio-dev \
            libexpat1-dev \
            zlib1g-dev \
            libzstd-dev \
            libjpeg-turbo8-dev \
            libsqlite3-dev \
            libutf8proc-dev \
            libglm-dev \
            rapidjson-dev

      - name: Setup Emscripten SDK
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: ${{ inputs.emsdk_version }}
          no-cache: true

      - name: Verify emcc
        run: emcc --version

      - name: Build Emscripten ports
        run: embuilder build zlib libjpeg sqlite3

      - name: Build chdman WASM
        run: |
          set -euo pipefail
          emmake make VERBOSE=1 -j$(nproc) -r \
            EMULATOR=0 \
            TOOLS=1 \
            TESTS=0 \
            IGNORE_GIT=1 \
            NOWERROR=1 \
            DEBUG=0 \
            SYMBOLS=0 \
            OPTIMIZE=s \
            NOASM=1 \
            NO_USE_MIDI=1 \
            NO_USE_PORTAUDIO=1 \
            NO_USE_PULSEAUDIO=1 \
            NO_USE_PIPEWIRE=1 \
            NO_X11=1 \
            NO_USE_XINPUT=1 \
            NO_SOUND=1 \
            USE_QTDEBUG=0 \
            "ARCHOPTS=-sWASM=1 -sALLOW_MEMORY_GROWTH=1 -sFORCE_FILESYSTEM=1 -sMODULARIZE=1 -sEXPORT_NAME=ChdmanModule -sEXPORTED_RUNTIME_METHODS=[\"FS\",\"callMain\"] -sEXIT_RUNTIME=0 -sERROR_ON_UNDEFINED_SYMBOLS=0 -O2" \
            asmjs 2>&1 | tee build.log

      - name: Upload build log (sempre, mesmo em falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.mame_ref }}-${{ github.run_id }}
          path: build.log
          if-no-files-found: warn

      - name: Localizar artefatos gerados
        run: |
          echo "=== root ==="
          ls -lh *.js *.wasm 2>/dev/null || echo "(nenhum na raiz)"
          echo "=== build/ ==="
          find build/ -name "chdman*" 2>/dev/null || echo "(nenhum em build/)"
          echo "=== build/asmjs/ ==="
          find build/asmjs* -type f 2>/dev/null | head -30 || echo "(dir nao encontrado)"

      - name: Coletar artefatos
        run: |
          mkdir -p public
          found=$(find . -maxdepth 6 \( -name "chdman.js" -o -name "chdman.wasm" \) 2>/dev/null)
          if [ -z "$found" ]; then
            echo "ERRO: chdman.js / chdman.wasm nao encontrados"
            exit 1
          fi
          echo "$found" | xargs -I{} cp {} public/
          echo "=== Coletados ==="
          ls -lh public/

      - name: Smoke test (Node)
        run: |
          node -e "
            const Module = require('./public/chdman.js');
            Module().then(m => {
              if (typeof m.FS === 'undefined') throw new Error('FS nao disponivel');
              if (typeof m.callMain === 'undefined') throw new Error('callMain nao disponivel');
              console.log('OK: WASM carregado, FS e callMain disponiveis');
            }).catch(e => { console.error(e); process.exit(1); });
          "

      - name: Upload artefatos WASM
        uses: actions/upload-artifact@v4
        with:
          name: chdman-wasm-${{ inputs.mame_ref }}-${{ github.run_id }}
          path: public/chdman.*
          if-no-files-found: error

      - name: Abrir PR com os artefatos
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: build/chdman-wasm-${{ github.run_id }}
          title: "build: chdman WASM para ${{ inputs.mame_ref }}"
          body: |
            Artefatos `chdman.js` e `chdman.wasm` gerados automaticamente.

            | Campo | Valor |
            |---|---|
            | MAME ref | `${{ inputs.mame_ref }}` |
            | Emscripten | `${{ inputs.emsdk_version }}` |
            | Run | `${{ github.run_id }}` |
          commit-message: "build: chdman WASM para ${{ inputs.mame_ref }}"
          add-paths: public/chdman.*
          delete-branch: true

      - name: Tamanhos finais
        run: du -sh public/chdman.*
